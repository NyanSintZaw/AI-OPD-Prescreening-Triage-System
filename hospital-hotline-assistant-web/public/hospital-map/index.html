<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CareNav Hospital Wayfinder</title>
  <link rel="stylesheet" href="style.css?v=13" />
</head>
<body>
  <main class="map-stage">
    <div id="mapViewport" class="map-viewport">
      <div id="transitionOverlay" class="transition-overlay" style="display: none;"><div class="transition-content"><div class="elevator-icon">🛗</div><h2 style="color: white;" id="transitionText"></h2></div></div>
      <div id="mapInner" class="map-inner">
        <img id="floorImage" alt="Hospital floor plan" draggable="false" />
        <svg id="routeOverlay" viewBox="0 0 637 454" preserveAspectRatio="none" aria-label="Hospital route overlay">
          <defs>
            <marker id="routeArrow" viewBox="0 0 12 12" markerWidth="7" markerHeight="7" refX="7.5" refY="6" orient="auto" markerUnits="strokeWidth">
              <path d="M2,2 L10,6 L2,10 Z" class="route-arrow"></path>
            </marker>
          </defs>
          <g id="blockerLayer"></g>
          <g id="poiLayer"></g>
          <path id="routeHalo" d=""></path>
          <path id="routeLine" d=""></path>
          <g id="turnLayer"></g>
          <g id="markerLayer"></g>
        </svg>
      </div>
    </div>

    <div class="brand-chip">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" role="img">
          <rect x="5" y="5" width="38" height="38" rx="12"></rect>
          <path d="M21 12h6v9h9v6h-9v9h-6v-9h-9v-6h9z"></path>
        </svg>
      </div>
      <span>CareNav Wayfinder</span>
    </div>

    <div id="kioskFloorSwitcher" class="kiosk-floor-switcher"></div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <aside id="plannerCard" class="planner-card" aria-label="Route planner">
      <div class="field-row">
        <div class="select-field">
          <label for="startSelect">Start location</label>
          <select id="startSelect"></select>
        </div>
        <div class="select-field">
          <label for="destinationSelect">Destination</label>
          <select id="destinationSelect"></select>
        </div>
      </div>

      <div class="action-row">
        <button id="findRouteBtn" class="primary-btn" type="button">Find route</button>
        <button id="resetBtn" class="ghost-btn" type="button">Reset</button>
      </div>

      <p class="map-hint">Tap the map to set a custom starting point</p>
    </aside>
  </main>

  <script src="map-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
