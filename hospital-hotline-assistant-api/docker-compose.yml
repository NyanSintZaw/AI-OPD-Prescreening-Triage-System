version: '3.8'

services:
  postgres:
    # pgvector image (Postgres 16 + the `vector` extension) — required by the
    # RAG index for the triage-manual embeddings. Plain postgres:16 lacks it.
    image: pgvector/pgvector:pg16
    container_name: hospital_hotline_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital_hotline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
